          print(f"\n✅ blog.companycam.com — {len(results)} pages scraped")
          EOF

      # ─────────────────────────────────────────
      # SUMMARY: counts across all 3 sites
      # ─────────────────────────────────────────
      - name: Print summary
        run: |
          python3 << 'EOF'
          import json
          from pathlib import Path

          total = 0
          for f in sorted(Path("scraped_data").glob("*.json")):
              data = json.loads(f.read_text())
              words = sum(len(p["content"].split()) for p in data)
              print(f"  {f.name}: {len(data)} pages — {words:,} words")
              total += len(data)
          print(f"\n  TOTAL: {total} pages across all sites")
          EOF

      # ─────────────────────────────────────────
      # COMMIT results directly to repo
      # ─────────────────────────────────────────
      - name: Commit scraped data to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scraped_data/
          git diff --staged --quiet || git commit -m "chore: scraped data update $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push