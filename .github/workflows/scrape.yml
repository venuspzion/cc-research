name: Scrape CompanyCam All Sites

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get install -y wget
          pip install beautifulsoup4 requests

      # ─────────────────────────────────────────
      # SITE 1: companycam.com
      # ─────────────────────────────────────────
      - name: Scrape companycam.com
        run: |
          python3 << 'EOF'
          import requests, json, time, random
          from bs4 import BeautifulSoup
          from urllib.parse import urljoin, urlparse

          HEADERS = {
              "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36",
              "Accept": "text/html,application/xhtml+xml,application/xml;q=0.9,image/webp,*/*;q=0.8",
              "Accept-Language": "en-US,en;q=0.9",
              "Referer": "https://www.google.com/",
              "DNT": "1",
          }

          BASE = "https://companycam.com"
          DOMAIN = "companycam.com"
          visited = set()
          results = []
          queue = [BASE]
          session = requests.Session()
          session.headers.update(HEADERS)

          def clean_text(soup):
              for tag in soup(["script","style","nav","footer","header","noscript"]):
                  tag.decompose()
              return " ".join(soup.get_text().split())

          while queue and len(visited) < 300:
              url = queue.pop(0)
              if url in visited:
                  continue
              visited.add(url)
              try:
                  time.sleep(random.uniform(0.3, 1.0))
                  r = session.get(url, timeout=15)
                  if r.status_code != 200:
                      print(f"SKIP {r.status_code}: {url}")
                      continue
                  soup = BeautifulSoup(r.text, "html.parser")
                  text = clean_text(soup)
                  title = soup.title.string.strip() if soup.title else ""
                  results.append({"url": url, "title": title, "content": text})
                  print(f"[{len(results)}] OK: {url}")
                  for a in soup.find_all("a", href=True):
                      href = urljoin(url, a["href"])
                      p = urlparse(href)
                      if p.netloc == DOMAIN and href not in visited and href not in queue:
                          queue.append(href)
              except Exception as e:
                  print(f"ERROR: {url} — {e}")

          import os
          os.makedirs("scraped_data", exist_ok=True)
          with open("scraped_data/companycam_main.json", "w") as f:
              json.dump(results, f, indent=2)
          print(f"\n✅ companycam.com — {len(results)} pages scraped")
          EOF

